<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="skills">

    <div class="skills-header">
        <h1>My Skills</h1>
        <p>
            Technologies and tools I use to build responsive
            and interactive web applications.
        </p>
    </div>

    <div class="skills-container">

        <div class="skill-card">
            <h3>HTML</h3>
            <div class="progress-bar">
                <div class="progress html"></div>
            </div>
            <span>90%</span>
        </div>

        <div class="skill-card">
            <h3>CSS</h3>
            <div class="progress-bar">
                <div class="progress css"></div>
            </div>
            <span>85%</span>
        </div>

        <div class="skill-card">
            <h3>JavaScript</h3>
            <div class="progress-bar">
                <div class="progress js"></div>
            </div>
            <span>75%</span>
        </div>

    </div>

    <div class="tools-section">

        <h2>Tools & Concepts</h2>

        <div class="tools-grid">
            <div class="tool">Responsive Design</div>
            <div class="tool">Flexbox</div>
            <div class="tool">CSS Grid</div>
            <div class="tool">DOM Manipulation</div>
            <div class="tool">VS Code</div>
            <div class="tool">Problem Solving</div>
        </div>

    </div>

</section>

</body>
</html>
